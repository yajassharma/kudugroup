
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kudu Group | Global Textile Excellence Since 1952</title>
    <title>Kudu Group | Global Textile Excellence Since 1952</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #ffffff, #f8f8f8, #f0f0f0, #ffffff);
        }
        body {
            background: #ffffff;
            color: #000000;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* Moving Light Grey/White Gradient Background */
        .moving-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
        
        /* Brand Ornamental Divider */
        .brand-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 0.75rem 0;
            position: relative;
        }
        .brand-divider::before, .brand-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0,0,0,0.1) 50%, transparent);
            max-width: 250px;
        }
        .brand-diamond {
            width: 8px;
            height: 8px;
            background: #000;
            transform: rotate(45deg);
            margin: 0 12px;
            position: relative;
        }
        .brand-diamond::after {
            content: "";
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border: 1px solid rgba(0,0,0,0.2);
        }

        /* Glassmorphism Refinement for Light Theme */
        .glass {
            backdrop-filter: blur(20px) saturate(1.8);
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #ffffff;
        }
        ::-webkit-scrollbar-thumb {
            background: #e0e0e0;
            border-radius: 10px;
        }

        .text-glow {
            text-shadow: 0 0 15px rgba(0,0,0,0.05);
        }
    </style>

</head>
<body>
    <div id="root"></div>
    <div class="moving-bg"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
